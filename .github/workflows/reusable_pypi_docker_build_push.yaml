name: Build and push docker image and python package

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      version:
        required: false
        type: string
      architecture:
        description: "Target architecture for the image (arm64 or amd64)"
        required: false
        default: "arm64"
        type: string
      pypi_url:
        required: true
        type: string
      package_directories:
        default: "."
        type: string

jobs:
  pypi-docker:
    runs-on: self-hosted
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so poetry-dynamic-versioning can derive the
          # version from the latest git tag. Harmless for repos that still
          # rely on the <VERSION> placeholder below.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push to registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/${{ inputs.architecture }}
          tags: ${{ inputs.image_name }}:${{ inputs.version }}
          build-args: RELEASED_VERSION=${{ inputs.version }}

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup poetry
        uses: Gr1N/setup-poetry@v8

      - name: Install poetry-dynamic-versioning plugin
        # No-op for repos that don't set `enable = true`; required for Poetry's
        # own build/publish to apply dynamic versioning (the build-backend
        # setting alone only covers PEP 517 frontends like pip).
        shell: bash
        run: poetry self add "poetry-dynamic-versioning[plugin]"

      - name: Publish package
        shell: bash
        env:
          PYPI_URL: ${{ inputs.pypi_url }}
          DIRECTORIES: ${{ inputs.package_directories }}
          RELEASED_VERSION: ${{ inputs.version }}
        run: |
          for DIRECTORY in ${DIRECTORIES}; do
            pushd "${DIRECTORY}"
            sed -i "s/<VERSION>/${RELEASED_VERSION}/" pyproject.toml
            poetry config repositories.private_pypi "${PYPI_URL}"
            poetry publish --build --repository private_pypi
            rm -r dist
            popd
          done

