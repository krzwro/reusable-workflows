name: Build and push docker image and python package

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      architecture:
        description: "Target architecture for the image (arm64 or amd64)"
        required: false
        default: "arm64"
        type: string
      pypi_url:
        required: true
        type: string
      package_directories:
        default: "."
        type: string

jobs:
  pypi-docker:
    runs-on: self-hosted
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Release
        uses: krzwro/automated-release-action@v1
        id: release
        with:
          add_tags: false

      - name: Fetch release tag
        # The Release step creates the tag on the remote; pull it locally so
        # poetry-dynamic-versioning resolves to this release, not the previous
        # tag. No-op for placeholder repos.
        if: ${{ steps.release.outputs.version }}
        shell: bash
        run: git fetch --tags --force

      - name: Build and push to registry
        uses: docker/build-push-action@v5
        if: ${{ steps.release.outputs.version }}
        with:
          context: .
          push: true
          platforms: linux/${{ inputs.architecture }}
          tags: ${{ inputs.image_name }}:${{ steps.release.outputs.version }}
          build-args: RELEASED_VERSION=${{ steps.release.outputs.version }}

      - name: Setup python
        uses: actions/setup-python@v5
        if: ${{ steps.release.outputs.version }}
        with:
          python-version: "3.11"

      - name: Setup poetry
        uses: Gr1N/setup-poetry@v8
        if: ${{ steps.release.outputs.version }}

      - name: Install poetry-dynamic-versioning plugin
        # No-op for repos that don't set `enable = true`; required for Poetry's
        # own build/publish to apply dynamic versioning (the build-backend
        # setting alone only covers PEP 517 frontends like pip).
        if: ${{ steps.release.outputs.version }}
        shell: bash
        run: poetry self add "poetry-dynamic-versioning[plugin]"

      - name: Publish package
        if: ${{ steps.release.outputs.version }}
        shell: bash
        env:
          PYPI_URL: ${{ inputs.pypi_url }}
          DIRECTORIES: ${{ inputs.package_directories }}
          RELEASED_VERSION: ${{ steps.release.outputs.version }}
        run: |
          for DIRECTORY in ${DIRECTORIES}; do
            pushd "${DIRECTORY}"
            sed -i "s/<VERSION>/${RELEASED_VERSION}/" pyproject.toml
            poetry config repositories.private_pypi "${PYPI_URL}"
            poetry publish --build --repository private_pypi
            rm -r dist
            popd
          done

